apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workquora-hpa
  namespace: workquora
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workquora-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
