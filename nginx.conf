user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
                    
    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Rate Limiting Zone Definitions (Vol 11)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream frontend_server {
        server frontend:80;
    }

    upstream backend_server {
        server backend:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Redirect http to https (SSL ready placeholder)
        # listen 443 ssl;
        # ssl_certificate /etc/ssl/certs/workquora.crt;
        # ssl_certificate_key /etc/ssl/private/workquora.key;

        # Static assets routing to Frontend container
        location / {
            proxy_pass http://frontend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API backend routes
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Socket.io connection routing (Vol 14)
        location /socket.io/ {
            proxy_pass http://backend_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
