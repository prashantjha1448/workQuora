version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: workquora-db-prod
    # Database ports are hidden from public interfaces for security hardening (Vol 11)
    expose:
      - "27017"
    volumes:
      - mongodb_prod_data:/data/db
    networks:
      - workquora-prod-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: workquora-cache-prod
    expose:
      - "6379"
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_prod_data:/data
    networks:
      - workquora-prod-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: workquora-backend-prod
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/skillsync
      - REDIS_URL=redis://:password@redis:6379
      - QUEUE_PROVIDER=redis
    secrets:
      - jwt_secret
      - gemini_key
    depends_on:
      - mongodb
      - redis
    networks:
      - workquora-prod-net
    deploy:
      replicas: 2 # Horizontal replication ready for production scaling (Vol 6)
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first # Zero downtime deployments (Vol 10)
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: workquora-frontend-prod
    networks:
      - workquora-prod-net
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  proxy:
    image: nginx:alpine
    container_name: workquora-gateway-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - workquora-prod-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  workquora-prod-net:
    driver: bridge

volumes:
  mongodb_prod_data:
  redis_prod_data:

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  gemini_key:
    file: ./secrets/gemini_key.txt
