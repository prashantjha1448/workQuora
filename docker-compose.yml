version: '3.8'

services:
  # ── DATABASE CONTAINER ──
  mongodb:
    image: mongo:6-jammy
    container_name: workquora-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - workquora-net

  # ── CACHING CONTAINER ──
  redis:
    image: redis:7-alpine
    container_name: workquora-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - workquora-net

  # ── API MONOLITH CONTAINER ──
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: workquora-backend
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/skillsync
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=315476e0d4199a70a0f140d6369547279c24290a8e2d6a32f566eae9442ccbf429e32e0c22b72b118790fef57e845df44d452f4ef3b816d61bb352538bf55bb5
      - QUEUE_PROVIDER=redis
    depends_on:
      - mongodb
      - redis
    ports:
      - "3000:3000"
    networks:
      - workquora-net

  # ── WEB APPLICATION CONTAINER ──
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: workquora-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - workquora-net

  # ── REVERSE PROXY GATEWAY ──
  proxy:
    image: nginx:alpine
    container_name: workquora-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - workquora-net

networks:
  workquora-net:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
